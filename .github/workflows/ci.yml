name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          # Dummy values só pra passar validação zod do env.ts.
          # Build não faz chamadas reais ao Supabase.
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key_for_ci_only_not_real_xxxxxxxxxxxx
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_PAYMENTS_ENABLED: "false"
        run: pnpm build

      - name: Test (CSV escape)
        run: npx --yes tsx@4.19.2 src/lib/export/__tests__/csv.test.ts
